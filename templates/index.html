<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearCast</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
        .input-wrap { position: relative; margin-bottom: 16px; }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #6c63ff; }
        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: white;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            z-index: 100;
            overflow: hidden;
            display: none;
        }
        .dropdown.open { display: block; }
        .dropdown-item {
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #f8f7ff; color: #6c63ff; }
        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            border-color: #6c63ff;
            background: #f0eeff;
            color: #6c63ff;
            font-weight: 500;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button[type="submit"]:hover { background: #5a52d5; }

        /* Results dashboard */
        .result { margin-top: 28px; display: none; }
        .result-header {
            background: #6c63ff;
            border-radius: 14px 14px 0 0;
            padding: 20px;
            color: white;
        }
        .result-location { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .result-datetime { font-size: 12px; opacity: 0.8; }
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #e0e0e0;
            border-left: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
        }
        .weather-cell {
            background: #f8f7ff;
            padding: 14px;
            text-align: center;
        }
        .weather-cell-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .weather-cell-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        .weather-cell-unit {
            font-size: 11px;
            color: #888;
        }
        .weather-description-bar {
            background: #f0eeff;
            border-left: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
            padding: 10px 16px;
            font-size: 13px;
            color: #6c63ff;
            font-weight: 500;
            text-align: center;
        }
        .outfit-section {
            background: white;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 14px 14px;
            padding: 20px;
        }
        .outfit-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .outfit-text { font-size: 15px; line-height: 1.7; color: #333; }
        .outfit-text strong { font-weight: 600; }
        .outfit-text h1, .outfit-text h2, .outfit-text h3 {
            font-size: 15px; font-weight: 600; margin-bottom: 6px;
        }
        .loading { text-align: center; color: #888; font-size: 14px; margin-top: 20px; }
        
        @media (max-width: 480px) {
            body { padding: 12px; align-items: flex-start; padding-top: 24px; }
            .card { padding: 24px 20px; }
            h1 { font-size: 22px; }
            .weather-cell-value { font-size: 16px; }
            .weather-cell { padding: 10px 6px; }
            .weather-cell-label { font-size: 10px; }
            .result-location { font-size: 15px; }
        }
      
    </style>
</head>
<body>
    <div class="card">
        <h1>🌤️ WearCast</h1>
        <p class="subtitle">AI outfit recommendations based on your weather</p>

        <form id="weatherForm">
            <label>Your location (city or zip code)</label>
            <div class="input-wrap">
                <input type="text" id="location" placeholder="e.g. Denver, CO" autocomplete="off" required />
                <div class="dropdown" id="dropdown"></div>
            </div>

            <label>Temperature preference</label>
            <div class="toggle-group">
                <button type="button" class="toggle-btn active" id="btn-cold" onclick="setTemp('cold')">I run cold 🥶</button>
                <button type="button" class="toggle-btn" id="btn-warm" onclick="setTemp('warm')">I run warm 🥵</button>
            </div>

            <label>I am a...</label>
            <div class="toggle-group">
                <button type="button" class="toggle-btn active" id="btn-woman" onclick="setGender('woman')">Woman 👩</button>
                <button type="button" class="toggle-btn" id="btn-man" onclick="setGender('man')">Man 👨</button>
            </div>

            <button type="submit">Get my outfit ✨</button>
        </form>

        <div id="loading" class="loading" style="display:none">Getting your outfit recommendation... ✨</div>
        <div class="result" id="result"></div>
    </div>

    <script>
        let runsCold = true;
        let gender = 'woman';
        let selectedLocation = '';
        let debounceTimer;

        function setTemp(pref) {
            runsCold = pref === 'cold';
            document.getElementById('btn-cold').classList.toggle('active', runsCold);
            document.getElementById('btn-warm').classList.toggle('active', !runsCold);
        }

        function setGender(g) {
            gender = g;
            document.getElementById('btn-woman').classList.toggle('active', g === 'woman');
            document.getElementById('btn-man').classList.toggle('active', g === 'man');
        }

        const locationInput = document.getElementById('location');
        const dropdown = document.getElementById('dropdown');

        locationInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = locationInput.value.trim();
            selectedLocation = '';
            if (q.length < 2) { dropdown.classList.remove('open'); return; }
            debounceTimer = setTimeout(async () => {
                const res = await fetch(`/autocomplete?q=${encodeURIComponent(q)}`);
                const suggestions = await res.json();
                if (!suggestions.length) { dropdown.classList.remove('open'); return; }
                dropdown.innerHTML = suggestions.map(s =>
                    `<div class="dropdown-item" onclick="selectLocation('${s.replace(/'/g, "\\'")}')">${s}</div>`
                ).join('');
                dropdown.classList.add('open');
            }, 300);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-wrap')) dropdown.classList.remove('open');
        });

        function selectLocation(name) {
            locationInput.value = name;
            selectedLocation = name;
            dropdown.classList.remove('open');
        }

        function getWeatherDescription(code) {
            if (code <= 2) return '☀️ Clear skies';
            if (code === 3) return '☁️ Overcast';
            if (code >= 61 && code <= 67) return '🌧️ Rainy';
            if (code >= 71 && code <= 77) return '❄️ Snowy';
            return '🌤️ Mixed conditions';
        }

        document.getElementById('weatherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const location = selectedLocation || locationInput.value.trim();
            if (!location) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            const response = await fetch('/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ location, runs_cold: runsCold, gender })
            });

            const data = await response.json();
            document.getElementById('loading').style.display = 'none';

            if (!response.ok || data.error) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerHTML =
                    `<div style="color:#b33;padding:16px">${data.error || 'Something went wrong.'}</div>`;
                return;
            }

            const now = new Date();
            const datetime = now.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const resultEl = document.getElementById('result');
            resultEl.style.display = 'block';
            resultEl.innerHTML = `
                <div class="result-header">
                    <div class="result-location">📍 ${location}</div>
                    <div class="result-datetime">${datetime}</div>
                </div>
                <div class="weather-grid">
                    <div class="weather-cell">
                        <div class="weather-cell-label">Temperature</div>
                        <div class="weather-cell-value">${data.weather.temperature}°</div>
                        <div class="weather-cell-unit">Fahrenheit</div>
                    </div>
                    <div class="weather-cell">
                        <div class="weather-cell-label">Wind Speed</div>
                        <div class="weather-cell-value">${data.weather.windspeed}</div>
                        <div class="weather-cell-unit">mph</div>
                    </div>
                    <div class="weather-cell">
                        <div class="weather-cell-label">Conditions</div>
                        <div class="weather-cell-value" style="font-size:22px">${getWeatherDescription(data.weather.weathercode).split(' ')[0]}</div>
                        <div class="weather-cell-unit">code ${data.weather.weathercode}</div>
                    </div>
                </div>
                <div class="weather-description-bar">${getWeatherDescription(data.weather.weathercode)}</div>
                <div class="outfit-section">
                    <div class="outfit-label">✨ Your perfect outfit</div>
                    <div class="outfit-text">${marked.parse(data.outfit)}</div>
                </div>
            `;
        });
    </script>
</body>
</html>
